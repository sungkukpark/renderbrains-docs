name: CI

on:
  push:
    branches-ignore:
      - main
    paths:
      - "wiki/**"
      - "tutorials/**"
      - "how-to/**"
      - "reference/**"
      - "explanation/**"
      - "index.qmd"
      - "privacy-policy.qmd"
      - "scripts/**"
      - "_quarto.yml"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - "wiki/**"
      - "tutorials/**"
      - "how-to/**"
      - "reference/**"
      - "explanation/**"
      - "index.qmd"
      - "privacy-policy.qmd"
      - "scripts/**"
      - "_quarto.yml"
      - "pyproject.toml"
      - "uv.lock"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: sync → lint → render
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Sync wiki → docs
        run: uv run python scripts/sync.py

      - name: Lint
        run: uv run python scripts/lint.py

      - name: Render site
        run: quarto render

      - name: Upload rendered site (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rendered-site-${{ github.sha }}
          path: _site/
          retention-days: 3
