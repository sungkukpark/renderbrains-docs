name: Publish

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "vault/**"
      - "scripts/**"
      - "_quarto.yml"
      - "pyproject.toml"
      - "uv.lock"

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: publish → S3
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Sync vault → docs
        run: uv run python scripts/sync.py

      - name: Lint
        run: uv run python scripts/lint.py

      - name: Render site
        run: quarto render

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Deploy to S3
        run: |
          aws s3 sync _site/ s3://renderbrains.com/ \
            --delete \
            --exact-timestamps
