project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - tutorials/**
    - how-to/**
    - reference/**
    - explanation/**
    - privacy-policy.qmd
  resources:
    - preview.html

website:
  title: "RenderBrains Docs"
  description: "Official documentation and knowledge base for RenderBrains."
  site-url: "https://renderbrains.com"
  repo-url: "https://github.com/sungkukpark/renderbrains-docs"
  repo-actions: [edit, issue]
  favicon: assets/favicon.ico
  open-graph: true

  navbar:
    background: dark
    foreground: light
    logo: assets/logo.svg
    logo-alt: "RenderBrains"
    left:
      - href: index.qmd
        text: Home
      - href: tutorials/index.qmd
        text: Tutorials
      - href: how-to/index.qmd
        text: How-To
      - href: reference/index.qmd
        text: Reference
      - href: explanation/index.qmd
        text: Explanation
    right:
      - icon: github
        href: https://github.com/sungkukpark/renderbrains-docs
        aria-label: GitHub

  sidebar: false

  page-footer:
    left: |
      &copy; RenderBrains. Built with [Quarto](https://quarto.org).
    center: |
      [Privacy Policy](privacy-policy.qmd)
    right:
      - icon: github
        href: https://github.com/sungkukpark/renderbrains-docs

  search:
    location: navbar
    type: overlay

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    toc-depth: 3
    toc-title: "On this page"
    number-sections: false
    smooth-scroll: true
    code-copy: true
    code-overflow: wrap
    highlight-style: github
    css: assets/custom.css

execute:
  freeze: true
